<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Productos | UTP Marketplace</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/main.css">
</head>

<body>

    <header>
        <nav class="navbar">

            <div class="logo">
                <h2>UTP Marketplace | Usuario</h2>
            </div>

            <ul class="menu">
                <li><a href="/">Inicio</a></li>
                <li><a class="active" href="/productos">Productos</a></li>
                <li><a href="/carrito">Carrito</a></li>
                <li><a href="/contacto">Contacto</a></li>
            </ul>

        </nav>
    </header>

    <main>

        <section class="catalogo">
            <h1 class="text-4xl font-bold">Catálogo de productos</h1>
            <p class="mt-4">
                Explora los productos publicados por estudiantes de la Universidad Tecnológica del Perú.
            </p>
        </section>

        <section class="busqueda">

            <input type="text" id="buscar" placeholder="Buscar producto">

            <select id="categoria">
                <option value="Todos">Todas las categorías</option>
                <option value="Libros">Libros</option>
                <option value="Tecnología">Tecnología</option>
                <option value="Calculadoras">Calculadoras</option>
                <option value="Accesorios">Accesorios</option>
                <option value="Instrumentos">Instrumentos</option>
            </select>

            <select id="orden">
                <option value="normal">Más recientes</option>
                <option value="menor">Precio: menor a mayor</option>
                <option value="mayor">Precio: mayor a menor</option>
            </select>

        </section>

        <section class="productos">

            <div class="productos-grid" id="lista-productos">

            </div>

        </section>

    </main>

    <footer class="footer">
        <p>UTP Marketplace</p>
        <p>Hussein Pineda - 2026 All Rights Reserved</p>
    </footer>

    <script src="/js/catalogo.js"></script>

</body>

</html>
