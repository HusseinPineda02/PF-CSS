<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Producto</title>
    <link rel="stylesheet" href="/css/main.css">
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <h2>UTP Marketplace | Administrador </h2>
            </div>
            <ul class="menu">
            <li><a href="/admin/productos">
            Volver
            </a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contacto">
            <h1>
            Producto
            </h1>
            <form
                th:action="@{/admin/guardar}"
                th:object="${producto}"
                method="post"
                class="formulario">
                <input
                    type="hidden"
                    th:field="*{id}">
                    <label>
                        Nombre
                    </label>
                <input
                    type="text"
                    th:field="*{nombre}"
                    required>
                    <label>
                        Categoría
                    </label>
                <input
                    type="text"
                    th:field="*{categoria}"
                    required>
                    <label>
                        Vendedor
                    </label>
                <input
                    type="text"
                    th:field="*{vendedor}"
                    required>
                <label>
                Precio
                </label>
                <input
                    type="number"
                    step="0.01"
                    th:field="*{precio}"
                required>
                <label>
                    Imagen
                </label>
                <input
                    type="text"
                    th:field="*{imagen}"
                    placeholder="img/producto9.jpg"
                required>
                <label>
                    Descripción
                </label>
                <textarea
                    rows="5"
                    th:field="*{descripcion}">
                </textarea>
                <br>
                <button
                    class="boton"
                    type="submit">
                    Guardar producto
                </button>
            </form>
        </section>

    </main>

</body>

</html>
