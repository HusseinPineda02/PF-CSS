<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <title>Iniciar sesión | UTP Marketplace</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/main.css}">

</head>

<body class="login-page">

    <div class="login-container">

        <div class="login-imagen">

            <img th:src="@{/img/hero.jpg}" alt="Marketplace">

        </div>

        <div class="login-card">

            <h1>UTP Marketplace</h1>

            <h2>Bienvenido</h2>

            <p>
                Inicie sesión para acceder al Marketplace de la Universidad Tecnológica del Perú.
            </p>

            <form action="/login" method="post">

                <label>Usuario</label>

                <input
                        type="text"
                        name="usuario"
                        placeholder="Ingrese su usuario"
                        required>

                <label>Contraseña</label>

                <input
                        type="password"
                        name="password"
                        placeholder="Ingrese su contraseña"
                        required>

                <button class="boton">
                    Iniciar sesión
                </button>

            </form>

        </div>

    </div>

</body>

</html>
